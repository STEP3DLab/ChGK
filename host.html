<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ведущий · Что? Где? Step3D!</title>
  <link rel="stylesheet" href="css/style.css" />
  <script type="module" src="js/ui.js" defer></script>
</head>
<body data-page="host">
  <header class="site-header">
    <div class="logo">
      <img class="logo-mark" src="assets/icons/step3d-mark.svg" alt="Step3D" />
      <div>
        <h1 class="title glitch">Что? Где? Step3D!</h1>
        <p class="subtitle">Кабинет ведущего</p>
      </div>
    </div>
    <span class="badge" data-status-badge>DEMO</span>
  </header>

  <main>
    <div class="container">
      <section class="card">
        <h2>Настройка команд</h2>
        <p id="host-status" class="subtitle">Шаг 1. Добавьте команды перед стартом игры.</p>
        <div class="field">
          <label for="team-count">Количество команд</label>
          <input id="team-count" type="number" min="1" value="2" />
        </div>
        <div id="team-fields" class="list"></div>
        <button class="button" id="save-teams">Сохранить команды</button>
      </section>

      <section class="card">
        <h2>Команды</h2>
        <div id="team-list" class="list"></div>
        <a class="button" id="open-lobby" href="game.html">Открыть лобби</a>
      </section>

      <section class="card">
        <h2>Банк вопросов</h2>
        <p class="subtitle">Шаг 2. Ведущий вводит вопросы и ответы заранее или по ходу игры.</p>
        <p>Добавлено: <strong id="question-count">0</strong></p>
        <form id="question-form" class="list">
          <div class="field">
            <label for="question-text">Вопрос</label>
            <textarea id="question-text" required></textarea>
          </div>
          <div class="field">
            <label for="question-answer">Ответ</label>
            <input id="question-answer" type="text" required />
          </div>
          <div class="field">
            <label for="question-comment">Комментарий</label>
            <textarea id="question-comment"></textarea>
          </div>
          <button class="button" type="submit">Сохранить вопрос</button>
        </form>
      </section>

      <section class="card">
        <h2>Список вопросов</h2>
        <div id="question-list" class="list"></div>
      </section>
    </div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <footer class="footer">Step3D · ведущий</footer>
</body>
</html>
