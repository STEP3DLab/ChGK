<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Экран игрока Step3D: таймер, вопрос и счёт в прямом эфире." />
  <meta name="theme-color" content="#0b0d12" />
  <meta name="color-scheme" content="dark" />
  <title>Игрок · Что? Где? Step3D!</title>
  <link rel="stylesheet" href="css/style.css" />
  <script type="module" src="js/ui.js" defer></script>
</head>
<body data-page="player">
  <a class="skip-link" href="#main-content">Перейти к содержимому</a>
  <header class="site-header">
    <div class="logo">
      <img class="logo-mark" src="assets/icons/step3d-mark.svg" alt="Step3D" />
      <div>
        <h1 class="title glitch">Что? Где? Step3D!</h1>
        <p class="subtitle">Экран игрока</p>
      </div>
    </div>

  </header>

  <main id="main-content">
    <div class="container split">
      <section class="card">
        <div class="card-header">
          <h2>Текущий раунд</h2>
          <span class="status-pill info">Live</span>
        </div>
        <p id="player-status" class="subtitle">Ожидаем подключения.</p>
        <p class="hint">Следите за таймером и текущим вопросом.</p>
        <p class="section-title">Состояние: <span id="round-state">—</span></p>
        <p class="timer" id="player-timer">—</p>
        <div class="progress" id="player-timer-progress" aria-hidden="true">
          <div class="progress-bar"></div>
        </div>
        <div class="divider"></div>
        <p id="player-question">Ожидаем вопрос.</p>

      </section>

      <section class="card">

      </section>
    </div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <footer class="footer">Step3D · игрок</footer>
</body>
</html>
