<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Игра · Что? Где? Step3D!</title>
  <link rel="stylesheet" href="css/style.css" />
  <script type="module" src="js/ui.js" defer></script>
</head>
<body data-page="game">
  <header class="site-header">
    <div class="logo">
      <img class="logo-mark" src="assets/icons/step3d-mark.svg" alt="Step3D" />
      <div>
        <h1 class="title glitch">Что? Где? Step3D!</h1>
        <p class="subtitle">Экран ведущего</p>
      </div>
    </div>
    <span class="badge" data-status-badge>DEMO</span>
  </header>

  <main>
    <div class="container split">
      <section class="card">
        <h2>Волчок и раунд</h2>
        <p id="game-status" class="subtitle">Готовы к запуску.</p>
        <div class="wheel-wrapper">
          <canvas class="wheel" id="wheel" aria-label="Волчок"></canvas>
        </div>
        <div class="inline">
          <button class="button" id="spin-button">Запустить волчок</button>
          <button class="button secondary" id="replay-spin">Переиграть</button>
        </div>
        <div class="field">
          <label for="timer-duration">Длительность (сек)</label>
          <select id="timer-duration">
            <option value="30">30</option>
            <option value="60" selected>60</option>
            <option value="90">90</option>
          </select>
        </div>
        <div class="soundboard">
          <p class="section-title">Звуки</p>
          <div class="inline">
            <button class="button ghost" data-sound="gong">Гонг</button>
            <button class="button ghost" data-sound="spin">Волчок</button>
            <button class="button ghost" data-sound="tick">Таймер</button>
            <button class="button ghost" data-sound="end">Конец</button>
          </div>
          <div class="field">
            <label for="volume">Громкость</label>
            <input id="volume" type="range" min="0" max="1" step="0.05" value="0.6" />
          </div>
          <button class="button secondary" id="mute-sound">Mute</button>
        </div>
        <button class="button" id="start-button">Старт раунда</button>
        <div class="divider"></div>
        <p class="section-title">Состояние: <span id="game-round-state">lobby</span></p>
        <p class="timer" id="game-timer">—</p>
        <div class="divider"></div>
        <p id="game-question">Ожидаем вопрос.</p>
        <div class="inline">
          <button class="button secondary" id="next-round">Следующий раунд</button>
          <button class="button ghost" id="export-json">Экспорт результатов</button>
        </div>
      </section>

      <section class="card">
        <h2>Ответы команд (ввод ведущим)</h2>
        <p class="subtitle">Введите ответы прямо во время раунда и сразу начисляйте очки.</p>
        <div id="answer-list" class="list"></div>
        <button class="button secondary" id="save-answers">Сохранить ответы</button>
        <div class="divider"></div>
        <h3>Таблица счета</h3>
        <div id="game-scoreboard" class="scoreboard"></div>
      </section>
    </div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <footer class="footer">Step3D · игра</footer>
</body>
</html>
