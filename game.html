<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Экран игры Step3D для ведущего: волчок, таймер и контроль раунда." />
  <meta name="theme-color" content="#0b0d12" />
  <meta name="color-scheme" content="dark" />
  <title>Игра · Что? Где? Step3D!</title>
  <link rel="stylesheet" href="css/style.css" />
  <script type="module" src="js/ui.js" defer></script>
</head>
<body data-page="game">
  <a class="skip-link" href="#main-content">Перейти к содержимому</a>
  <header class="site-header">
    <div class="logo">
      <img class="logo-mark" src="assets/icons/step3d-mark.svg" alt="Step3D" />
      <div>
        <h1 class="title glitch">Что? Где? Step3D!</h1>
        <p class="subtitle">Экран ведущего</p>
      </div>
    </div>

  </header>

  <main id="main-content">
    <div class="container split">
      <section class="card">
        <div class="card-header">
          <h2>Волчок и раунд</h2>
          <span class="status-pill warning">Раунд</span>
        </div>
        <p id="game-status" class="subtitle">Готовы к запуску.</p>
        <div class="wheel-wrapper">
          <canvas class="wheel" id="wheel" aria-label="Волчок"></canvas>
        </div>
        <div class="inline">
          <button class="button primary" id="spin-button">Запустить волчок</button>
          <button class="button secondary" id="replay-spin">Переиграть</button>
        </div>
        <div class="field">
          <label for="timer-duration">Длительность (сек)</label>
          <p class="hint" id="timer-hint">Выберите длительность обсуждения до старта раунда.</p>
          <select id="timer-duration">
            <option value="30">30</option>
            <option value="60" selected>60</option>
            <option value="90">90</option>
          </select>
        </div>
        <div class="soundboard">
          <p class="section-title">Звуки</p>
          <div class="inline">
            <button class="button ghost" data-sound="gong">Гонг</button>
            <button class="button ghost" data-sound="spin">Волчок</button>
            <button class="button ghost" data-sound="tick">Таймер</button>
            <button class="button ghost" data-sound="end">Конец</button>
          </div>
          <div class="field">
            <label for="volume">Громкость</label>
            <input id="volume" type="range" min="0" max="1" step="0.05" value="0.6"
              aria-describedby="volume-hint" />
            <p id="volume-hint" class="hint">Громкость влияет на все звуки панели.</p>
          </div>
          <button class="button secondary" id="mute-sound" aria-pressed="false">Без звука</button>
        </div>
        <button class="button primary" id="start-button">Старт раунда</button>
        <div class="divider"></div>
        <div class="inline space-between">
          <p class="section-title">Состояние: <span id="game-round-state">lobby</span></p>
          <span class="pill" id="answer-count">Ответов: 0</span>
        </div>
        <p class="timer" id="game-timer">—</p>
        <div class="progress" id="game-timer-progress" aria-hidden="true">
          <div class="progress-bar"></div>
        </div>
        <div class="divider"></div>
        <p id="game-question">Ожидаем вопрос.</p>
        <div class="answer-reveal" id="answer-reveal" hidden>
          <span class="section-title">Правильный ответ</span>
          <strong id="correct-answer">—</strong>
          <p class="hint" id="answer-comment"></p>
        </div>
        <div class="inline">
          <button class="button secondary" id="reveal-answer">Показать ответ</button>
          <button class="button ghost" id="hide-answer">Скрыть ответ</button>
        </div>
        <div class="inline">
          <button class="button secondary" id="next-round">Следующий раунд</button>
          <button class="button ghost" id="export-json">Экспорт результатов</button>
        </div>
      </section>

      <section class="card">

        <div class="divider"></div>
        <h3>Таблица счета</h3>
        <div id="game-scoreboard" class="scoreboard" data-empty="Нет данных по счету."></div>
      </section>
    </div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <footer class="footer">Step3D · игра</footer>
</body>
</html>
