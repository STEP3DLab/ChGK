<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Подключение · Что? Где? Step3D!</title>
  <link rel="stylesheet" href="css/style.css" />
  <script type="module" src="js/ui.js" defer></script>
</head>
<body data-page="join">
  <header class="site-header">
    <div class="logo">
      <img class="logo-mark" src="assets/icons/step3d-mark.svg" alt="Step3D" />
      <div>
        <h1 class="title glitch">Что? Где? Step3D!</h1>
        <p class="subtitle">Подключение к игре</p>
      </div>
    </div>
    <span class="badge" data-status-badge>DEMO</span>
  </header>

  <main>
    <div class="container">
      <section class="card">
        <h2>Введите код сессии</h2>
        <div class="field">
          <label for="session-input">Session ID</label>
          <input id="session-input" type="text" placeholder="ABC123" />
        </div>
        <p id="join-status" class="subtitle">Ожидаем ввод кода.</p>
      </section>

      <section class="card">
        <h2>Экран зрителя</h2>
        <p class="subtitle">Откройте общий экран, чтобы следить за раундами и счетом.</p>
        <div class="field">
          <label for="team-select">Команды</label>
          <select id="team-select" disabled></select>
        </div>
        <button class="button" id="join-session">Открыть экран зрителя</button>
      </section>
    </div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <footer class="footer">Step3D · подключение к сессии</footer>
</body>
</html>
